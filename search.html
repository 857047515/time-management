<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>搜索</title><link rel="stylesheet" href="app.css"></head><body><div class="app" id="app"></div><script src="app.js"></script><script>
function render(){ $('#app').innerHTML=topbar()+`<section class="section"><div class="title">⌕ 搜索區</div><input id="q" placeholder="搜尋任務、子任務、時間記錄、生活型態..." oninput="go()"><div id="res"></div></section>`;go()}
function go(){let q=($('#q')?.value||'').trim().toLowerCase();let tasks=db.get('tasks',[]).filter(t=>!t.deleted&&(!q||JSON.stringify(t).toLowerCase().includes(q)));let records=db.get('records',[]).filter(r=>!r.deleted&&(!q||JSON.stringify(r).toLowerCase().includes(q)));let lifes=db.get('lifestyles',[]).filter(l=>!l.deleted&&(!q||l.name.toLowerCase().includes(q)));$('#res').innerHTML=`<div class="title">任務</div>${tasks.map(t=>`<div class="card" onclick="location.href='task-form.html?id=${t.id}'"><b>${t.title}</b><br><span class="muted">${life(t.lifestyleId).name}｜${timeRange(t)}</span></div>`).join('')||'<p class="muted">沒有任務結果</p>'}<div class="title">時間記錄</div>${records.map(r=>`<div class="card"><b>${r.activityName}</b><br><span class="muted">${r.startAt.slice(11)}-${r.endAt.slice(11)}｜意義 ${r.meaningScore}｜快樂 ${r.happinessScore}</span></div>`).join('')||'<p class="muted">沒有時間記錄結果</p>'}<div class="title">生活型態</div>${lifes.map(l=>`<div class="card"><i class="sw" style="background:${l.color}"></i>${l.name}</div>`).join('')}`}
render();
</script></body></html>
