<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>今日任務</title><link rel="stylesheet" href="../assets/css/app.css"></head><body><div class="app" id="app"></div><script src="../assets/js/app.js"></script><script>
function render(){let tasks=db.get('tasks',[]).filter(t=>!t.deleted&&t.startAt.slice(0,10)<=todayISO()&&t.endAt.slice(0,10)>=todayISO()).sort((a,b)=>a.endAt.localeCompare(b.endAt)||b.importance-a.importance);let pending=tasks.filter(t=>!taskDone(t)), done=tasks.filter(taskDone);$('#app').innerHTML=topbar()+`<section class="section"><div class="title">☑ 今日任務</div><div id="pending"></div><div class="title">▥ 今天完成進度</div><div id="done"></div></section>`;$('#pending').innerHTML=pending.map(card).join('')||'<div class="card muted">一開始今日任務是空的，去新增事項建立任務吧。</div>';$('#done').innerHTML=done.map(doneCard).join('')||'<div class="card muted">目前還沒有完成的任務。</div>'}
function card(t){let l=life(t.lifestyleId);let doneCount=t.subtasks.filter(s=>s.done).length;return `<div class="card task-card" style="--c:${l.color}" ondblclick="location.href='task-form.html?id=${t.id}'"><div class="check ${taskDone(t)?'done':''}" onclick="toggleTask('${t.id}')">${taskDone(t)?'✓':''}</div><div><h3>${t.title} <span class="pill ${doneCount?'todo':'wait'}">${doneCount?'進行中':'待開始'}</span></h3>${t.subtasks.map(s=>`<label class="row"><input type="checkbox" ${s.done?'checked':''} onchange="sub('${t.id}','${s.id}',this.checked)">${s.title}</label>`).join('')}</div><div class="side"><div class="star">${'★'.repeat(t.importance)}${'☆'.repeat(5-t.importance)}</div><div class="muted">◷ ${timeRange(t)}</div><b>${doneCount}/${t.subtasks.length||1} 完成</b></div><button class="btn" onclick="more('${t.id}')">⋯</button></div>`}
function doneCard(t){let l=life(t.lifestyleId);return `<div class="card row between" style="border-left:6px solid ${l.color}"><div>✅ <b>${t.title}</b></div><div class="muted">全部完成時間 ${new Date().toTimeString().slice(0,5)}</div><button class="btn" onclick="toggleTask('${t.id}',false)">取消完成</button></div>`}
function sub(tid,sid,ck){let tasks=db.get('tasks',[]);let t=tasks.find(x=>x.id===tid);t.subtasks.find(s=>s.id===sid).done=ck;t.completed=taskDone(t);db.set('tasks',tasks);render()}
function toggleTask(id,force){let tasks=db.get('tasks',[]);let t=tasks.find(x=>x.id===id);let v=force===undefined?!taskDone(t):force;t.completed=v;t.subtasks.forEach(s=>s.done=v);db.set('tasks',tasks);render()}
function more(id){if(confirm('要編輯這個任務嗎？按取消則刪除。')) location.href='task-form.html?id='+id; else if(confirm('確認刪除？')){deleteTask(id);render()}}
render();
</script></body></html>
