<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>月曆</title><link rel="stylesheet" href="../assets/css/app.css"></head><body><div class="app" id="app"></div><script src="../assets/js/app.js"></script><script>
let cur=new Date();function ym(){return `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}`}function render(){let y=cur.getFullYear(),m=cur.getMonth();$('#app').innerHTML=topbar()+`<section class="section"><div class="row between"><div class="title">▣ ${y} 年 ${m+1} 月</div><div><button class="btn" onclick="cur.setMonth(cur.getMonth()-1);render()">‹</button><button class="btn" onclick="cur=new Date();render()">今天</button><button class="btn" onclick="cur.setMonth(cur.getMonth()+1);render()">›</button></div></div><div class="calendar-grid" id="cal"></div><div id="legend" class="row" style="flex-wrap:wrap;margin:16px 0"></div><div class="title">▥ 學習進度甘特圖</div><div id="gantt"></div></section>`;drawCal();drawGantt()}
function dayTasks(date){return db.get('tasks',[]).filter(t=>!t.deleted&&t.startAt.slice(0,10)<=date&&t.endAt.slice(0,10)>=date).sort((a,b)=>b.importance-a.importance||a.endAt.localeCompare(b.endAt))}
function drawCal(){let y=cur.getFullYear(),m=cur.getMonth();let first=new Date(y,m,1),start=new Date(y,m,1-first.getDay());let html='日一二三四五六'.split('').map(w=>`<div class="day" style="min-height:auto;font-weight:800;text-align:center">${w}</div>`).join('');for(let i=0;i<42;i++){let d=new Date(start);d.setDate(start.getDate()+i);let iso=d.toISOString().slice(0,10);let t=dayTasks(iso)[0];let l=t?life(t.lifestyleId):null;html+=`<div class="day" style="opacity:${d.getMonth()==m?1:.35}"><b style="color:${iso==todayISO()?'#086bff':''}">${d.getDate()}</b>${t?`<div class="event" style="background:${l.color}22;color:#111">${t.title}<br>${timeRange(t)}</div>`:''}</div>`}$('#cal').innerHTML=html;let stats={};db.get('tasks',[]).filter(t=>!t.deleted&&t.startAt.slice(0,7)==ym()).forEach(t=>stats[t.lifestyleId]=(stats[t.lifestyleId]||0)+1);$('#legend').innerHTML=Object.entries(stats).map(([id,n])=>`<span><i class="sw" style="background:${life(id).color}"></i>${life(id).name} ${n} 個</span>`).join('')}
function drawGantt(){let tasks=db.get('tasks',[]).filter(t=>!t.deleted&&t.startAt.slice(0,7)==ym());let last=new Date(cur.getFullYear(),cur.getMonth()+1,0).getDate();$('#gantt').innerHTML=tasks.map(t=>{let l=life(t.lifestyleId),s=new Date(t.startAt).getDate(),e=new Date(t.endAt).getDate(),p=t.subtasks.length?Math.round(t.subtasks.filter(x=>x.done).length/t.subtasks.length*100):taskDone(t)?100:0;return `<div class="gantt-row"><div style="border-left:5px solid ${l.color};padding-left:8px"><b>${t.title}</b><br><span class="muted">${p}%</span></div><div class="barbox"><div class="bar" style="--c:${l.color};--l:${(s-1)/last*100}%;--w:${Math.max(8,(e-s+1)/last*100)}%"></div></div></div>`}).join('')||'<div class="card muted">這個月還沒有任務。</div>'}
render();
</script></body></html>
