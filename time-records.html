<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>時間記錄</title><link rel="stylesheet" href="app.css"></head><body><div class="app" id="app"></div><script src="app.js"></script><script>
let page=1,editing=null;function render(){ $('#app').innerHTML=topbar()+`<section class="section"><div class="title">◷ 今日時間記錄（每 20 分鐘一段）</div><div class="tabs">${[1,2,3,4].map(n=>`<button class="btn tab ${page==n?'active':''}" onclick="page=${n};render()">${(n-1)*6}:00-${n*6}:00</button>`).join('')}</div><div class="card" id="slots"></div></section>${modalHTML()}`;drawSlots()}
function slots(){let out=[],start=(page-1)*6*60;for(let m=start;m<start+360;m+=20){out.push([m,m+20])}return out}function hm(min){return `${String(Math.floor(min/60)).padStart(2,'0')}:${String(min%60).padStart(2,'0')}`}function findRec(s,e){let d=todayISO();return db.get('records',[]).find(r=>!r.deleted&&r.startAt==d+'T'+hm(s)&&r.endAt==d+'T'+hm(e))}
function drawSlots(){$('#slots').innerHTML=slots().map(([s,e])=>{let r=findRec(s,e),l=r?life(r.lifestyleId):{color:'#cbd5e1'};return `<div class="slot" style="--c:${l.color}" ondblclick="openEdit(${s},${e})"><b>${hm(s)} - ${hm(e)}</b><span>${r?r.activityName:'尚未安排'}</span><span>${r?'✅':'−'}</span></div>`}).join('')+`<button class="btn" style="width:100%;margin-top:12px" onclick="page=Math.min(4,page+1);render()">查看更多時間段⌄</button>`}
function modalHTML(){return `<div class="modal" id="m"><div class="modal-box"><h2>編輯時間段</h2><div class="row"><input id="st" type="time"><input id="en" type="time"></div><div class="field"><label>類型 <span class="req">*</span></label><select id="lf">${db.get('lifestyles',[]).filter(l=>!l.deleted).map(l=>`<option value="${l.id}">${l.name}</option>`)}</select></div><div class="field"><label>任務 / 活動 <span class="req">*</span></label><input id="act" placeholder="休息時間"></div><div class="field"><label>意義程度 <span class="req">*</span></label><select id="mean">${[1,2,3,4,5].map(n=>`<option>${n}</option>`)}</select></div><div class="field"><label>快樂程度 <span class="req">*</span></label><select id="happy">${[1,2,3,4,5].map(n=>`<option>${n}</option>`)}</select></div><textarea id="note" placeholder="輸入備註..."></textarea><br><br><div class="row"><button class="btn" onclick="modal('#m',false)">取消</button><button class="btn primary" onclick="saveRec()">儲存</button></div></div></div>`}
function openEdit(s,e){let d=todayISO();editing=findRec(s,e);modal('#m',true);$('#st').value=hm(s);$('#en').value=hm(e);$('#lf').value=editing?.lifestyleId||db.get('lifestyles',[])[0].id;$('#act').value=editing?.activityName||'';$('#mean').value=editing?.meaningScore||3;$('#happy').value=editing?.happinessScore||3;$('#note').value=editing?.note||''}
function saveRec(){let d=todayISO(),arr=db.get('records',[]),rec={id:editing?.id||uid(),lifestyleId:$('#lf').value,activityName:$('#act').value,startAt:d+'T'+$('#st').value,endAt:d+'T'+$('#en').value,meaningScore:+$('#mean').value,happinessScore:+$('#happy').value,note:$('#note').value};if(!rec.activityName)return alert('請輸入活動名稱');let i=arr.findIndex(x=>x.id===rec.id);if(i>=0)arr[i]=rec;else arr.push(rec);db.set('records',arr);modal('#m',false);render()}
render();
</script></body></html>
