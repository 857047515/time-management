<!doctype html><html lang="zh-Hant"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>新增任務</title><link rel="stylesheet" href="app.css"></head><body><div class="app" id="app"></div><script src="app.js"></script><script>
let id=new URLSearchParams(location.search).get('id');let old=db.get('tasks',[]).find(t=>t.id===id);let selected=old?.lifestyleId||'';let imp=old?.importance||3;
function render(){let t=old||{title:'',startAt:todayISO()+'T09:30',endAt:todayISO()+'T11:00',note:'',subtasks:[{id:uid(),title:'',done:false},{id:uid(),title:'',done:false}]};$('#app').innerHTML=topbar()+`<section class="section"><div class="title">⊞ ${id?'編輯任務':'新增任務'}</div><form id="form"><div class="field"><label>任務標題 <span class="req">*</span></label><input id="title" maxlength="50" required value="${t.title}"><div class="counter"><span id="tc">${t.title.length}</span>/50</div></div><div class="field"><label>重要程度（1-5分） <span class="req">*</span></label><div class="importance">${[1,2,3,4,5].map(n=>`<div class="imp ${imp==n?'active':''}" onclick="setImp(${n})"><b>${n}</b><br>${['不重要','稍微重要','普通','重要','非常重要'][n-1]}</div>`).join('')}</div></div><div class="field"><label>生活型態 <span class="req">*</span></label><button type="button" class="btn" style="width:100%" onclick="toggleLife()" id="lifeText">${selected?life(selected).name:'請選擇生活型態'} ▾</button><div id="lifeList" class="dropdown hidden"></div></div><div class="field"><label>時間 <span class="req">*</span></label><div class="row"><input type="datetime-local" id="start" value="${t.startAt}" required><input type="datetime-local" id="end" value="${t.endAt}" required></div><p>預計時間：<b id="mins">0</b> 分鐘</p></div><div class="field"><label>子任務（選填）</label><div id="subs"></div><button type="button" class="btn ghost" onclick="addSub()">＋ 新增子任務</button></div><div class="field"><label>備註（選填）</label><textarea id="note" maxlength="200">${t.note||''}</textarea><div class="counter"><span id="nc">${(t.note||'').length}</span>/200</div></div><div class="row"><button class="btn" type="button" onclick="history.back()">取消</button><button class="btn primary" style="flex:1">${id?'儲存修改':'新增任務'}</button></div></form></section>${lifeModals()}`;renderLife();renderSubs(t.subtasks);bind()}
function bind(){$('#title').oninput=()=>$('#tc').textContent=$('#title').value.length;$('#note').oninput=()=>$('#nc').textContent=$('#note').value.length;['start','end'].forEach(x=>$('#'+x).onchange=calc);calc();$('#form').onsubmit=e=>{e.preventDefault();if(!selected)return alert('請選擇生活型態');let payload={id:id||undefined,title:$('#title').value.trim(),importance:imp,lifestyleId:selected,startAt:$('#start').value,endAt:$('#end').value,estimatedMinutes:minutes($('#start').value,$('#end').value),note:$('#note').value.trim(),completed:old?.completed||false,subtasks:$$('.subinput').map((i,k)=>({id:i.dataset.id||uid(),title:i.value.trim(),done:false})).filter(s=>s.title)};saveTask(payload);location.href='today.html'}}
function calc(){$('#mins').textContent=minutes($('#start').value,$('#end').value)}function setImp(n){imp=n;render()}function addSub(){let d=document.createElement('div');d.className='subtask';d.innerHTML=`<span class="handle">☰</span><input class="subinput" placeholder="輸入子任務..."><button type="button" class="btn" onclick="this.parentElement.remove()">×</button>`;$('#subs').appendChild(d)}function renderSubs(a){$('#subs').innerHTML=a.map(s=>`<div class="subtask"><span class="handle">☰</span><input class="subinput" data-id="${s.id}" value="${s.title}" placeholder="輸入子任務..."><button type="button" class="btn" onclick="this.parentElement.remove()">×</button></div>`).join('')}
function renderLife(){let list=$('#lifeList');list.innerHTML=db.get('lifestyles',[]).filter(l=>!l.deleted).map(l=>`<div class="life-row"><span onclick="selected='${l.id}';$('#lifeText').textContent='${l.name} ▾';toggleLife(false)"><i class="sw" style="background:${l.color}"></i>${l.name}</span><button class="btn" onclick="pendingDelete='${l.id}';$('#delName').textContent='${l.name}';modal('#del',true)">刪除</button></div>`).join('')+`<div class="life-row"><button class="btn ghost" onclick="modal('#addLife',true)">＋ 新增生活型態</button></div>`}function toggleLife(force){$('#lifeList').classList.toggle('hidden',force===undefined?undefined:!force)}
let pendingDelete=null;function lifeModals(){return `<div class="modal" id="addLife"><div class="modal-box"><h2>新增生活型態</h2><input id="lifeName" maxlength="20" placeholder="生活型態名稱"><div class="colors">${['#2563eb','#22c55e','#f59e0b','#f97316','#ef4444','#9333ea','#6b7280','#93c5fd','#86efac','#fde68a','#fed7aa','#fecdd3','#d8b4fe','#e5e7eb'].map(c=>`<button class="color" style="background:${c}" onclick="pick='${c}';$$('.color').forEach(x=>x.classList.remove('active'));this.classList.add('active')"></button>`).join('')}</div><br><div class="row"><button class="btn" onclick="modal('#addLife',false)">取消</button><button class="btn primary" onclick="createLife()">確定</button></div></div></div><div class="modal" id="del"><div class="modal-box"><h2>🗑 確認刪除</h2><p>確定要刪除「<b id="delName"></b>」嗎？以前資料不會消失。</p><div class="row"><button class="btn" onclick="modal('#del',false)">取消</button><button class="btn danger" onclick="delLife()">確認刪除</button></div></div></div>`}let pick='#2563eb';function createLife(){let name=$('#lifeName').value.trim();if(!name)return alert('請輸入名稱');let arr=db.get('lifestyles',[]);arr.push({id:uid(),name,color:pick});db.set('lifestyles',arr);modal('#addLife',false);render()}function delLife(){let arr=db.get('lifestyles',[]).map(l=>l.id===pendingDelete?{...l,deleted:true}:l);db.set('lifestyles',arr);modal('#del',false);render()}
render();
</script></body></html>
